<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ASIM MODS | SIM/CNIC Lookup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0c12, #030507);
        }
        .glass-card {
            background: rgba(18, 22, 35, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 100, 0.2);
        }
        .neon-border {
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.3);
        }
        input:focus {
            box-shadow: 0 0 0 3px rgba(0, 255, 100, 0.2);
            border-color: #00ff64 !important;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff64;
            border-radius: 10px;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dtz: {
                            500: '#00FF9C',
                            600: '#00CC7A',
                            900: '#0A0F0D'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="border-b border-[#1A2A24] bg-[#0A0F0D]/80 backdrop-blur-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-dtz-500 text-xl font-bold tracking-tight">ASIM MODS</h1>
                <p class="text-gray-500 text-xs">SIM / CNIC Database</p>
            </div>
            <button onclick="toggleTheme()" class="bg-[#1A2A24] px-3 py-2 rounded-lg text-gray-300 hover:text-dtz-500 transition">
                🌙
            </button>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-4xl mx-auto w-full px-4 py-8 flex flex-col gap-6">

        <!-- Tabs -->
        <div class="flex bg-[#111] p-1 rounded-xl glass-card">
            <button onclick="switchTab('search')" id="tab-search"
                class="flex-1 py-3 bg-dtz-500 text-black font-bold rounded-lg transition-all">
                🔍 Data Lookup
            </button>
            <button onclick="switchTab('history')" id="tab-history"
                class="flex-1 py-3 text-gray-400 font-bold rounded-lg transition-all">
                📜 History
            </button>
        </div>

        <!-- Search Section -->
        <section id="view-search" class="flex flex-col gap-6">

            <div class="glass-card rounded-2xl p-6 border border-[#1A2A24]">
                <h2 class="text-dtz-500 text-lg font-bold mb-2 flex items-center gap-2">
                    <i class="fas fa-database"></i> Search Database
                </h2>
                <p class="text-gray-400 text-sm mb-4">Enter phone number (03xxxxxxxxx) or 13‑digit CNIC</p>

                <!-- Type Toggle inside form -->
                <div class="flex gap-3 mb-5 bg-black/40 p-1 rounded-xl w-fit">
                    <button type="button" id="type-sim" class="type-btn active px-4 py-2 rounded-lg text-sm font-semibold transition">📱 SIM</button>
                    <button type="button" id="type-cnic" class="type-btn px-4 py-2 rounded-lg text-sm font-semibold transition">🆔 CNIC</button>
                </div>

                <form id="lookup-form" class="flex flex-col gap-4">
                    <input id="lookup-input" type="text" required
                        placeholder="e.g., 03001234567 or 1234512345671"
                        class="w-full bg-black/60 border border-[#1A2A24] text-dtz-500 rounded-xl px-4 py-4 outline-none focus:border-dtz-500 font-mono transition">
                    <button type="submit"
                        class="w-full bg-dtz-500 hover:bg-dtz-600 text-black font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-search"></i> Search Data
                    </button>
                </form>
            </div>

            <div id="results-container" class="glass-card rounded-2xl p-6 border border-[#1A2A24] hidden">
                <!-- results injected here -->
            </div>
        </section>

        <!-- History Section -->
        <section id="view-history" class="hidden flex-col gap-4">
            <div class="flex justify-between items-center glass-card p-4 rounded-xl border border-[#1A2A24]">
                <h2 class="text-dtz-500 font-bold flex items-center gap-2"><i class="fas fa-clock"></i> Recent Searches</h2>
                <button onclick="clearHistory()" class="text-red-500 text-sm hover:text-red-400 transition">Clear all</button>
            </div>
            <div id="history-list" class="flex flex-col gap-3"></div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-8 text-center text-gray-500 text-xs py-6 border-t border-[#1A2A24]">
        <p>Powered by ASIM MODS • Data for verification only</p>
        <p class="mt-1">📢 Join our WhatsApp channel: <a href="https://whatsapp.com/channel/0029VawAFpk7oQhaVcrxgG06" target="_blank" class="text-dtz-500 hover:underline">ASIM MODS</a></p>
    </footer>

    <script>
        // ==================== CONFIGURATION ====================
        const API_URL = "https://sim-api.fakcloud.tech/";

        let currentType = "sim"; // 'sim' or 'cnic' (only affects validation, API same)
        let historyData = JSON.parse(localStorage.getItem("dtz_history") || "[]");

        // ==================== DOM ELEMENTS ====================
        const searchView = document.getElementById("view-search");
        const historyView = document.getElementById("view-history");
        const tabSearch = document.getElementById("tab-search");
        const tabHistory = document.getElementById("tab-history");
        const resultsContainer = document.getElementById("results-container");
        const lookupInput = document.getElementById("lookup-input");
        const lookupForm = document.getElementById("lookup-form");
        const typeSimBtn = document.getElementById("type-sim");
        const typeCnicBtn = document.getElementById("type-cnic");

        // ==================== UTILITIES ====================
        function toggleTheme() {
            document.documentElement.classList.toggle("dark");
        }

        function switchTab(tab) {
            if (tab === "search") {
                searchView.classList.remove("hidden");
                historyView.classList.add("hidden");
                tabSearch.classList.add("bg-dtz-500", "text-black");
                tabSearch.classList.remove("text-gray-400");
                tabHistory.classList.remove("bg-dtz-500", "text-black");
                tabHistory.classList.add("text-gray-400");
            } else {
                searchView.classList.add("hidden");
                historyView.classList.remove("hidden");
                tabHistory.classList.add("bg-dtz-500", "text-black");
                tabHistory.classList.remove("text-gray-400");
                tabSearch.classList.remove("bg-dtz-500", "text-black");
                tabSearch.classList.add("text-gray-400");
                renderHistory();
            }
        }

        function normalizePhone(raw) {
            let cleaned = raw.replace(/\D/g, '');
            if (cleaned.length === 11 && cleaned.startsWith('0')) {
                cleaned = cleaned.substring(1);
            }
            if (cleaned.length === 10 && cleaned.startsWith('3')) return cleaned;
            return null;
        }

        function normalizeCNIC(raw) {
            let cleaned = raw.replace(/\D/g, '');
            if (cleaned.length === 13) return cleaned;
            return null;
        }

        function showResult(record) {
            resultsContainer.classList.remove("hidden");
            resultsContainer.innerHTML = `
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-user-check text-dtz-500 text-xl"></i>
                    <h3 class="text-dtz-500 font-bold text-lg">Owner Details</h3>
                </div>
                <div class="space-y-3 font-mono text-sm">
                    <div class="flex justify-between border-b border-[#1A2A24] pb-2">
                        <span class="text-gray-400">📞 Phone:</span>
                        <span class="text-white">${escapeHtml(record.phone || '—')}</span>
                    </div>
                    <div class="flex justify-between border-b border-[#1A2A24] pb-2">
                        <span class="text-gray-400">👤 Name:</span>
                        <span class="text-white">${escapeHtml(record.full_name || '—')}</span>
                    </div>
                    <div class="flex justify-between border-b border-[#1A2A24] pb-2">
                        <span class="text-gray-400">🆔 CNIC:</span>
                        <span class="text-white">${escapeHtml(record.cnic || '—')}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">📍 Address:</span>
                        <span class="text-white text-right">${escapeHtml(record.address || '—')}</span>
                    </div>
                </div>
            `;
        }

        function showError(msg) {
            resultsContainer.classList.remove("hidden");
            resultsContainer.innerHTML = `<div class="text-red-500 text-center py-6"><i class="fas fa-exclamation-triangle mr-2"></i>${escapeHtml(msg)}</div>`;
        }

        function showLoading() {
            resultsContainer.classList.remove("hidden");
            resultsContainer.innerHTML = `<div class="text-gray-400 text-center py-6"><i class="fas fa-spinner fa-spin mr-2"></i>Searching database...</div>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== HISTORY ====================
        function addHistory(phone, name) {
            historyData.unshift({ phone, name, timestamp: Date.now() });
            if (historyData.length > 20) historyData.pop();
            localStorage.setItem("dtz_history", JSON.stringify(historyData));
        }

        function renderHistory() {
            const list = document.getElementById("history-list");
            if (!historyData.length) {
                list.innerHTML = `<div class="glass-card p-6 text-center text-gray-500 rounded-xl border border-[#1A2A24]">No recent searches</div>`;
                return;
            }
            list.innerHTML = historyData.map(item => `
                <div class="glass-card p-4 rounded-xl border border-[#1A2A24] hover:border-dtz-500 transition cursor-pointer" onclick="fillSearch('${item.phone}')">
                    <p class="text-white font-mono text-sm">${escapeHtml(item.phone)}</p>
                    <p class="text-gray-400 text-xs mt-1">${escapeHtml(item.name)}</p>
                </div>
            `).join("");
        }

        function clearHistory() {
            historyData = [];
            localStorage.removeItem("dtz_history");
            renderHistory();
        }

        window.fillSearch = function(number) {
            document.getElementById("lookup-input").value = number;
            switchTab("search");
            document.getElementById("lookup-form").dispatchEvent(new Event("submit"));
        };

        // ==================== API LOOKUP (fakcloud) ====================
        async function performLookup(query) {
            showLoading();
            try {
                const url = `${API_URL}?q=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.success && data.data && data.data.records && data.data.records.length > 0) {
                    const record = data.data.records[0];
                    showResult(record);
                    addHistory(record.phone || query, record.full_name || "Unknown");
                } else {
                    showError("No information found for this number.");
                }
            } catch (err) {
                console.error(err);
                showError("Server error or invalid response. Try again later.");
            }
        }

        // ==================== FORM SUBMIT ====================
        lookupForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            let raw = lookupInput.value.trim();
            if (!raw) {
                showError("Please enter a phone number or CNIC.");
                return;
            }
            let normalized = null;
            if (currentType === "sim") {
                normalized = normalizePhone(raw);
                if (!normalized) {
                    showError("Invalid phone number. Use format 03XXXXXXXXX (11 digits).");
                    return;
                }
            } else {
                normalized = normalizeCNIC(raw);
                if (!normalized) {
                    showError("Invalid CNIC. Must be 13 digits (without dashes).");
                    return;
                }
            }
            await performLookup(normalized);
        });

        // ==================== TOGGLE TYPE ====================
        function setType(type) {
            currentType = type;
            if (type === "sim") {
                typeSimBtn.classList.add("bg-dtz-500", "text-black");
                typeSimBtn.classList.remove("text-gray-400", "bg-transparent");
                typeCnicBtn.classList.remove("bg-dtz-500", "text-black");
                typeCnicBtn.classList.add("text-gray-400", "bg-transparent");
                lookupInput.placeholder = "03xxxxxxxxx (11 digits)";
            } else {
                typeCnicBtn.classList.add("bg-dtz-500", "text-black");
                typeCnicBtn.classList.remove("text-gray-400", "bg-transparent");
                typeSimBtn.classList.remove("bg-dtz-500", "text-black");
                typeSimBtn.classList.add("text-gray-400", "bg-transparent");
                lookupInput.placeholder = "1234512345671 (13 digits)";
            }
            resultsContainer.classList.add("hidden");
        }

        typeSimBtn.addEventListener("click", () => setType("sim"));
        typeCnicBtn.addEventListener("click", () => setType("cnic"));

        // Initialize
        setType("sim");
        renderHistory();
    </script>
    <script src="https://kit.fontawesome.com/a5f2f2b8e2.js" crossorigin="anonymous"></script>
</body>
        </html>
