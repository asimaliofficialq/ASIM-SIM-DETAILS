<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIM Sim Database | Secure Identity Lookup</title>
    <style>
        /* --- 1. COLOR & VARIABLE DEFINITION --- */
        :root {
            --bg-primary: #0B0B0B;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #AAAAAA;
            --accent: #00E5FF;
            --accent-hover: #00B8D4;
            --border-subtle: #222222;
            --input-bg: #181818;
            --shadow-elevation: 0 8px 30px rgba(0, 229, 255, 0.15);
            --transition-speed: 0.3s;
            --toast-bg: #141414;
            --toast-border: var(--accent);
        }

        body.light-theme {
            --bg-primary: #F0F0F0;
            --bg-secondary: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #555555;
            --accent: #00B8D4;
            --accent-hover: #0099CC;
            --border-subtle: #E0E0E0;
            --input-bg: #FFFFFF;
            --shadow-elevation: 0 4px 20px rgba(0, 0, 0, 0.1);
            --toast-bg: #FFFFFF;
            --toast-border: var(--accent);
        }

        /* --- 2. BASE & TYPOGRAPHY --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- 3. HEADER & THEME TOGGLE --- */
        header {
            padding: 30px 20px 20px;
            text-align: center;
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 15px;
            content: url("https://fak-h.jokerkeep057.workers.dev/pOxNw"); 
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            border: 3px solid var(--accent);
            transition: box-shadow var(--transition-speed), border-color var(--transition-speed);
        }
        
        header h1 {
            font-size: clamp(1.6em, 4vw, 2.2em);
            color: var(--text-primary);
            letter-spacing: 1px;
            margin: 0;
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.1);
        }

        header p.tagline {
            margin-top: 5px;
            color: var(--text-secondary);
            font-size: clamp(0.8em, 1.5vw, 1em);
        }

        /* Theme Toggle */
        #theme-toggle {
            position: absolute;
            top: 30px;
            right: 20px;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            transition: background-color var(--transition-speed), transform 0.1s;
        }
        #theme-toggle:hover {
            background-color: var(--border-subtle);
            transform: scale(1.05);
        }
        #theme-toggle svg {
            fill: var(--text-primary);
            width: 22px;
            height: 22px;
        }

        /* --- 4. WHATSAPP BUTTON (Header Integration) --- */
        #header-whatsapp-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        #header-whatsapp-btn:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        /* --- 5. CONTAINER & FORM --- */
        .container {
            width: 90%;
            max-width: 550px;
            padding: 30px;
            background-color: var(--bg-secondary);
            border-radius: 15px;
            box-shadow: var(--shadow-elevation);
            border: 1px solid var(--border-subtle);
            margin-bottom: 40px;
            transition: background-color var(--transition-speed);
        }

        #lookup-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #lookup-input {
            padding: 18px;
            border: 2px solid var(--border-subtle);
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1.15em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #lookup-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.5); 
            outline: none;
        }
        
        #submit-button {
            padding: 16px;
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        #submit-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        #submit-button:active {
            transform: translateY(0);
        }

        /* --- 6. RESULT DISPLAY --- */
        .result-title {
            font-size: 1.7em;
            color: var(--accent);
            border-bottom: 2px solid var(--border-subtle);
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-weight: 700;
            text-align: center;
        }

        .result-card {
            background-color: var(--bg-primary);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 20px;
        }
        
        .data-pair {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border-subtle);
            align-items: baseline;
        }
        .data-pair:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .data-label {
            font-weight: 500;
            color: var(--text-secondary);
            min-width: 120px;
            padding-right: 15px;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .data-value {
            text-align: right;
            flex-grow: 1;
            word-break: break-word;
            font-size: 1.05em;
        }

        #copy-button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background-color: var(--text-secondary); 
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
        }
        #copy-button:hover {
            background-color: var(--accent);
            color: var(--bg-primary);
            transform: translateY(-1px);
        }
        
        /* --- 7. MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
                width: 95%;
            }
            header {
                padding-top: 20px;
            }
            
            .data-pair {
                flex-direction: column;
                align-items: flex-start;
                border-bottom: 1px dashed var(--border-subtle);
            }
            .data-label {
                margin-bottom: 3px;
                font-size: 0.85em;
            }
            .data-value {
                text-align: left;
            }
        }

        /* --- 8. TOAST STYLES --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1050;
            display: flex;
            flex-direction: column-reverse; 
            gap: 10px;
            pointer-events: none;
        }
        
        .toast {
            min-width: 250px;
            padding: 15px 20px;
            border-radius: 8px;
            color: var(--text-primary);
            background-color: var(--toast-bg);
            border: 1px solid var(--toast-border);
            opacity: 0;
            transform: translateX(100%);
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 0.95em;
            display: flex;
            align-items: center;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
        
        .toast.error {
            border-color: #FF4444;
            color: #FF4444;
        }
        .toast.error .toast-icon {
            color: #FF4444;
        }
        .toast:not(.error) .toast-icon {
             color: var(--accent);
        }

        /* --- 9. MODAL STYLES --- */
        #whatsapp-modal-overlay {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-out, visibility 0.4s;
        }

        #whatsapp-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .whatsapp-modal {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 90%;
            width: 350px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); 
            border: 2px solid var(--accent);
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }
        
        #whatsapp-modal-overlay.active .whatsapp-modal {
            transform: scale(1);
            opacity: 1;
        }

        .whatsapp-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid var(--accent);
            object-fit: cover;
        }

        .whatsapp-modal h2 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .whatsapp-modal p {
            font-size: 0.95em;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .whatsapp-modal a.follow-button {
            display: inline-block;
            background-color: var(--accent);
            color: var(--bg-primary);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.3s, transform 0.1s;
        }

        .whatsapp-modal a.follow-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        .whatsapp-modal .skip-button {
            margin-top: 18px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9em;
            transition: color 0.3s;
        }
        .whatsapp-modal .skip-button:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body class="dark-theme">

    <div id="toast-container"></div>

    <div id="whatsapp-modal-overlay">
        <div class="whatsapp-modal">
            <img 
                src="https://fak-h.jokerkeep057.workers.dev/pOxNw" 
                alt="Channel Logo" 
                class="whatsapp-logo"
                id="channel-logo"
            >
            <h2 id="channel-name">ASIM OFFICIAL Channel</h2>
            <p id="channel-details"><span style="color: var(--text-secondary);">Fetching live data...</span></p>

            <a 
                href="#" 
                class="follow-button" 
                target="_blank"
                id="follow-channel-button"
            >
                ✅ Join for 10x Updates
            </a>
            <div class="skip-button" onclick="closeModal()">Proceed to Lookup (Skip)</div>
        </div>
    </div>

    <header>
        <div id="theme-toggle" onclick="toggleTheme()" role="button" aria-label="Toggle dark and light theme">
            <svg id="moon-icon" viewBox="0 0 24 24" fill="none" style="display: block;">
                <path d="M12 3a9 9 0 109 9c0-.46-.04-.91-.12-1.35a6.001 6.001 0 01-5.36-5.36A9.004 9.004 0 0012 3z" fill="currentColor"/>
            </svg>
            <svg id="sun-icon" viewBox="0 0 24 24" fill="none" style="display: none;">
                <path d="M12 18a6 6 0 100-12 6 6 0 000 12zM12 22a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM3 12a1 1 0 100 2H2a1 1 0 110-2h1zM21 12a1 1 0 100 2h-1a1 1 0 110-2h1zM11 1.7a1 1 0 012 0v1.3a1 1 0 01-2 0V1.7zM19.78 4.22a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM4.93 18.36a1 1 0 011.41 0l-.71.71a1 1 0 01-1.41 1.41l.71-.71a1 1 0 010-1.41zM4.22 4.22a1 1 0 011.41 0L6.34 5.63a1 1 0 01-1.41 1.41L4.22 5.63a1 1 0 010-1.41zM18.36 18.36a1 1 0 011.41 0l.71.71a1 1 0 01-1.41 1.41l-.71-.71a1 1 0 010-1.41z" fill="currentColor"/>
            </svg>
        </div>
        <img 
            src="https://fak-h.jokerkeep057.workers.dev/pOxNw" 
            alt="ASIM OFFICIAL Logo" 
            id="logo"
        >
        <h1>ASIM Sim Database</h1>
        <p class="tagline">Join for 10x updates</p>
        <a href="#" id="header-whatsapp-btn" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="16" height="16" style="fill: var(--bg-primary);"><path d="M380.9 97.6c7.1 3.4 12.3 7.1 15.6 11.2 3.3 4.1 4.9 8.7 4.9 13.8v277.3c0 7.6-3.6 14.3-10.7 19.1-7.1 4.9-16.8 7.3-29.1 7.3H101.7c-12.3 0-22-2.4-29.1-7.3-7.1-4.8-10.7-11.5-10.7-19.1V122.6c0-5.1 1.6-9.7 4.9-13.8 3.3-4.1 8.5-7.8 15.6-11.2C82.8 84.8 90.7 83.2 101.7 83.2h244.6c11 0 18.9 1.6 26.1 4.4zM224 432c-26.5 0-49.2-7.6-68.1-22.8-18.9-15.2-28.3-34.3-28.3-57.2s9.4-42 28.3-57.2c18.9-15.2 41.6-22.8 68.1-22.8s49.2 7.6 68.1 22.8c18.9 15.2 28.3 34.3 28.3 57.2s-9.4 42-28.3 57.2c-18.9 15.2-41.6 22.8-68.1 22.8zm0-44.6c15.9 0 29.4-4.4 40.5-13.3 11.1-8.9 16.7-21.4 16.7-37.4s-5.6-28.5-16.7-37.4c-11.1-8.9-24.6-13.3-40.5-13.3s-29.4 4.4-40.5 13.3c-11.1 8.9-16.7 21.4-16.7 37.4s5.6 28.5 16.7 37.4c11.1 8.9 24.6 13.3 40.5 13.3z"/></svg>
            WhatsApp
        </a>
    </header>

    <div class="container">
        <form id="lookup-form">
            <input 
                type="text" 
                id="lookup-input" 
                placeholder="Enter Mobile Number (e.g., 03xx-xxxxxxx)" 
                required
                aria-label="Search input for Mobile Number or CNIC"
            >
            <button type="submit" id="submit-button">RESOLVE IDENTITY</button>
        </form>
        
        <div id="results-container">
        </div>
    </div>
    
    <script>
        const WORKER_PROXY_URL = 'https://sim-api.fakcloud.tech/'; 
        const CACHE_TTL_SECONDS = 86400;
        const CHANNEL_LINK = "https://whatsapp.com/channel/0029VawAFpk7oQhaVcrxgG06";

        const toastContainer = document.getElementById('toast-container');
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) {
                toast.classList.add('error');
                toast.innerHTML = `<span class="toast-icon">❌</span> ${message}`;
            } else {
                toast.innerHTML = `<span class="toast-icon">✅</span> ${message}`;
            }
            
            toastContainer.prepend(toast); 
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10); 

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300); 
            }, 5000);
        }

        window.alert = function(message) {
            showToast(message, true);
        };
        
        const body = document.body;
        const moonIcon = document.getElementById('moon-icon');
        const sunIcon = document.getElementById('sun-icon');
        
        function applyTheme(isDark) {
            body.classList.toggle('light-theme', !isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            moonIcon.style.display = isDark ? 'block' : 'none';
            sunIcon.style.display = isDark ? 'none' : 'block';
        }

        function toggleTheme() {
            const isDark = !body.classList.contains('light-theme');
            applyTheme(!isDark);
        }
        
        window.toggleTheme = toggleTheme;
       
        const modalOverlay = document.getElementById('whatsapp-modal-overlay');
        const followButton = document.getElementById('follow-channel-button');
        const channelNameEl = document.getElementById('channel-name');
        const channelDetailsEl = document.getElementById('channel-details');
        const channelLogoEl = document.getElementById('channel-logo');
        const mainPageLogoEl = document.getElementById('logo');

        function closeModal() {
            modalOverlay.classList.remove('active');
            localStorage.setItem('modalSkipped', 'true');
        }
        window.closeModal = closeModal;

        function fetchChannelData() {
            channelDetailsEl.innerHTML = `<span style="color: var(--text-secondary);">Community updates are on the Go-To Button!</span>`;
            followButton.href = CHANNEL_LINK;
        }
        
        function copyToClipboard(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = buttonElement.textContent;
                buttonElement.textContent = '✅ Copied!';
                showToast('Data copied to clipboard.');
                setTimeout(() => {
                    buttonElement.textContent = originalText;
                }, 1500);
            }).catch(() => {
                showToast('Failed to copy. Please copy manually.', true);
            });
        }
        
        function renderResult(data) {
            const item = data; 
            let allText = `--- FAK Identity Record ---\n`;
            
            const html = `
                <div class="result-card">
                    <div class="result-title">Identity Resolved</div>
                    <button id="copy-button">Copy All Data</button>
                    <div class="result-card" id="data-to-copy">
                        <div class="data-pair"><div class="data-label">NUMBER:</div><div class="data-value">${item.number || 'N/A'}</div></div>
                        <div class="data-pair"><div class="data-label">NAME:</div><div class="data-value">${item.name || 'N/A'}</div></div>
                        <div class="data-pair"><div class="data-label">CNIC:</div><div class="data-value">${item.cnic || 'N/A'}</div></div>
                        <div class="data-pair"><div class="data-label">ADDRESS:</div><div class="data-value">${item.address || 'N/A'}</div></div>
                    </div>
                </div>
            `;
            resultsContainer.innerHTML = html;
            
            allText += `Number: ${item.number || 'N/A'}\n`;
            allText += `Name: ${item.name || 'N/A'}\n`;
            allText += `CNIC: ${item.cnic || 'N/A'}\n`;
            allText += `Address: ${item.address || 'N/A'}\n--------------------------------------`;

            document.getElementById('copy-button').addEventListener('click', (e) => {
                copyToClipboard(allText, e.currentTarget);
            });
        }

        function renderLookupError(title, message, rawDetails = null) {
             resultsContainer.innerHTML = `
                <div class="result-card">
                    <div class="result-title">${title}</div>
                    <p style="color: red; font-size: 1.1em; text-align: center;">${message}</p>
                    ${rawDetails ? `<p style="color: var(--text-secondary); font-size: 0.9em;">Details:</p>
                    <pre style="color: var(--text-secondary); font-size: 0.75em; word-break: break-all; background-color: var(--input-bg); padding: 10px; border-radius: 5px;">${JSON.stringify(rawDetails, null, 2)}</pre>` : ''}
                </div>
            `;
        }


        const form = document.getElementById('lookup-form');
        const input = document.getElementById('lookup-input');
        const resultsContainer = document.getElementById('results-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultsContainer.innerHTML = '';
            showToast('Querying secure database...');
            
            const rawInput = input.value.trim();
            const cleanedNumber = rawInput.replace(/[^0-9]/g, '');

            if (!cleanedNumber || (cleanedNumber.length < 10 && cleanedNumber.length !== 13)) {
                showToast('Invalid Input: Use 11-digit Mobile (03xx...) or 13-digit CNIC.', true);
                return;
            }
            
            const workerUrl = `${WORKER_PROXY_URL}?number=${cleanedNumber}`;
            
            try {
                const response = await fetch(workerUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        // Browser sends its origin automatically
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success === true && data.name) {
                    showToast('Data retrieved successfully.');
                    renderResult(data);
                } else {
                    // Handle 403 from Worker (Origin block) or logical failure (success: false)
                    if (response.status === 403) {
                         renderLookupError("Access Restricted", "Your domain is not authorized to access this service. Please check your configuration.");
                         showToast('Access Denied.', true);
                    } else if (data.error) {
                        // Handle specific "Not Found" error from worker merger
                        renderLookupError("Lookup Failed", data.error, data.raw_response);
                    } else {
                        renderLookupError("Request Issue", "The service returned an unexpected response structure.");
                    }
                }
            } catch (error) {
                renderLookupError("Connection Interrupted", "The identity service is currently unreachable or timed out.");
                console.error('Fetch error:', error);
            }
        });
        
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            const startDark = (savedTheme !== 'light'); 
            applyTheme(startDark);
            
            if (localStorage.getItem('modalSkipped') !== 'true') {
                 modalOverlay.classList.add('active');
            }
            
            fetchChannelData();
        };
    </script>
</body>
</html>
