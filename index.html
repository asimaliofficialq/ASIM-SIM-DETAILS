<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Code Viewer</title>

<style>
*{
    box-sizing:border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: #050505;
    color: #fff;
    overflow-x: hidden;
}

/* Floating Hearts */
@keyframes floatHearts {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.heart {
    position: fixed;
    bottom: -10px;
    font-size: 18px;
    animation: floatHearts 7s linear infinite;
    color: #ff4d6d;
    user-select: none;
}

/* Card */
.card {
    width: 95%;
    max-width: 420px;
    margin: 90px auto;
    padding: 20px 16px;
    border-radius: 18px;
    text-align: center;
    background: rgba(25,25,25,0.65);
    box-shadow: 0 0 22px rgba(255,0,90,0.30);
    backdrop-filter: blur(10px);
}

/* Title */
.title {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #ff3b7a, #00eaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 18px;
}

/* Input */
input {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1f1f1f;
    color: #fff;
    margin-bottom: 14px;
    font-size: 14px;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2266, #ffae35, #00ffd0);
    color: #fff;
}

.btn:active {
    transform: scale(0.97);
}

.copy-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #00c986;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
}

/* Output */
pre {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: #0a0f1d;
    border-radius: 10px;
    max-height: 280px;
    overflow-y: auto;
    color: #4dffba;
    font-size: 13px;
    border: 1px solid #222;
    white-space: pre-wrap;
    text-align: left;
}

/* Footer */
.footer {
    margin-top: 12px;
    font-size: 12px;
    color: #ffb36b;
}

/* Desktop improvement */
@media (min-width: 768px){
    .card{
        margin-top:120px;
    }
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for (let i = 0; i < 12; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (5 + Math.random() * 4) + "s";
    document.body.appendChild(h);
}
</script>

<div class="card">
    <div class="title">Resource Code Viewer</div>

    <input type="text" id="url" placeholder="Enter Website URL">

    <button class="btn" onclick="getSource()">Fetch Code</button>

    <button class="copy-btn" onclick="copyCode()">Copy Code</button>

    <pre id="output">Code will appear here…</pre>

    <div class="footer">Designed by ASIM 💚</div>
</div>

<script>
async function getSource() {
    const url = document.getElementById("url").value.trim();
    const output = document.getElementById("output");

    if (!url) {
        alert("Please enter a URL!");
        return;
    }

    output.textContent = "Loading...";

    try {
        const res = await fetch(url);
        const data = await res.text();
        output.textContent = data;
    } catch (e) {
        output.textContent = "❌ Error fetching code (CORS issue)\n\n" + e;
    }
}

function copyCode() {
    const code = document.getElementById("output").textContent;
    navigator.clipboard.writeText(code);
    alert("Code copied!");
}
</script>

</body>
</html>
